name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sysplug
    permissions:
      id-token: write  # OIDC trusted publishing — no API token needed

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$TAG  version=$VER"
          test "$TAG" = "$VER" || { echo "::error::Tag $TAG != pyproject version $VER"; exit 1; }

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: pip install twine && twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
